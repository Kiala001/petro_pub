
<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal Acadêmico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gradient-to-b from-red-50 to-white">

    <nav class="bg-gradient-to-r from-red-900 to-red-800 text-white">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <a href="index.html" class="text-2xl font-bold text-amber-400">🏛️ Petrochamp</a>
        </div>
    </nav>

    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-lg shadow-xl p-8 border-t-4 border-red-900">
                <h1 class="text-3xl font-bold text-red-900 mb-2">Login</h1>
                <p class="text-gray-600 mb-8">Aceda ao seu portal académico</p>

                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Email</label>
                        <input type="email" id="email" name="email" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-900">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Senha</label>
                        <input type="password" id="password" name="password" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-900">
                    </div>

                    <div id="error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded"></div>

                    <button type="button" id="btnFormSubmit" onclick="submitForm()" class="w-full btn-primary">
                        Entrar
                    </button>
                </form>

                <!-- 2FA Modal -->
                <div id="twoFactorModal" class="hidden mt-6 pt-6 border-t">
                    <h2 class="text-lg font-bold text-red-900 mb-4">Verificação em Dois Passos</h2>
                    <p class="text-gray-600 mb-4">Insira o código de 6 dígitos enviado</p>
                    <input type="text" id="twoFactorCode" maxlength="6" placeholder="000000"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-900 text-center tracking-widest text-2xl">
                    <button type="button" onclick="verify2FA()" class="w-full mt-4 bg-gradient-to-r from-green-600 to-green-700 text-white font-bold py-2 rounded-lg hover:shadow-lg transition">
                        Verificar
                    </button>
                </div>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        Não tem conta? 
                        <a href="register.html" class="text-red-900 font-semibold hover:underline">Registre-se</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>


        async function submitForm() {

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await apiRequest('auth/login', {
                method: 'POST',
                body: { email, password }
            });

            const errorDiv = document.getElementById('error');

            if (!response || response.status >= 500) {
                errorDiv.textContent = 'Erro no servidor. Tente novamente mais tarde.';
                errorDiv.classList.remove('hidden');
                return;
            }

            const respData = response.data || {};

            if (!respData.success) {
                errorDiv.textContent = respData.error || 'Erro ao fazer login';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (response.data.requires_2fa) {
                is2FARequired = true;
                document.getElementById('twoFactorModal').classList.remove('hidden');
                errorDiv.classList.add('hidden');
                return;
            }

            // Login bem-sucedido
            setToken(response.data.token);
            localStorage.setItem('user', response.data.token)
            setUserData({
                user_id: response.data.user_id,
                name: response.data.name,
                type: response.data.type
            });

            window.location.href = 'dashboard.html';
        }
    </script>
</html>
