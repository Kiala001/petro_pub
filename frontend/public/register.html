<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - Portal Acadêmico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gradient-to-b from-red-50 to-white">

    <nav class="bg-gradient-to-r from-red-900 to-red-800 text-white">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <a href="index.html" class="text-2xl font-bold text-amber-400">
                <img src="assets/img/logo/8.png" alt="Petrochamp Logotipo" srcset="assets/img/logo/8.png" class="w-60 h-40">
            </a>
        </div>
    </nav>

    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-lg shadow-xl p-8 border-t-4 border-red-900">
                <h1 class="text-3xl font-bold text-red-900 mb-2">Registro</h1>
                <p class="text-gray-600 mb-8">Crie sua conta académica</p>

                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Nome Completo</label>
                        <input type="text" id="name" name="name" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-900">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Email</label>
                        <input type="email" id="email" name="email" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-900">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Senha (mín. 8 caracteres)</label>
                        <input type="password" id="password" name="password" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-900">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Confirmar Senha</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-900">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Tipo de Usuário</label>
                        <select id="type" name="type" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-900">
                            <option value="COMMON_USER">Usuário Comum</option>
                            <option value="PROFESSOR">Professor/Coordenador</option>
                        </select>
                    </div>

                    <div id="error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded"></div>
                    <div id="success" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded"></div>

                    <button type="submit" class="w-full btn-primary">
                        Registrar
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        Já tem conta? 
                        <a href="login.html" class="text-red-900 font-semibold hover:underline">Entre aqui</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
